# YDB vector index tuning — example configuration for `vectordbbench ydb-tune`.
#
# Usage:
#   export YDB_ENDPOINT=grpc://localhost:2136
#   export YDB_DATABASE=/Root/test
#   vectordbbench ydb-tune --config-file ydb_tune_config.yml

case_type: Performance768D1M
task_label: ydb_tune
db_label: ydb-8c32g

# Connection (can also be set via YDB_ENDPOINT / YDB_DATABASE env vars)
endpoint: grpc://localhost:2136
database: /Root/test

# Recall target for binary search and final selection (matches many published HNSW configs)
target_recall: 0.92
min_recall: 0.88

# Serial sweep values for KMeansTreeSearchTopSize (cheap — no reload)
search_top_size_values: [1, 2, 5, 10, 20, 32, 64]

# Index build grid. Each entry triggers a full load + index rebuild.
# Start with server defaults (empty dict), expand only if recall ceiling is too low.
index_build_grid:
  - {}

# Uncomment for a coarse build-param search (expensive):
# index_build_grid:
#   - {}
#   - levels: 2
#     clusters: 256
#   - levels: 3
#     clusters: 512
#     overlap_clusters: 2

cover_embedding: true

# How many Pareto-optimal configs get a full concurrent benchmark at the end
finalize_top_n: 2

# Compare against published VectorDBBench results with these task labels
baseline_task_labels:
  - standard_20260403

output_dir: ./ydb_tune_results

# Extra flags forwarded to every `vectordbbench ydb` invocation
extra_cli_args: []
